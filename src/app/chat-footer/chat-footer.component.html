<mat-form-field>
    <mat-label>Input</mat-label>
    <input matInput [formControl]="input">
</mat-form-field>

<button mat-fab extended (click)="sendMessage()">
    <mat-icon>send</mat-icon>
    Send
</button>

<button mat-fab extended (click)="endConversation()">
    <mat-icon>highlight_off</mat-icon>
    End Conversation
</button>
